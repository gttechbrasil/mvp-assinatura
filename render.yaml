services:
  - type: web
    name: mvp-assinatura-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: APP_URL
        sync: false
      - key: ASAAS_API_KEY
        sync: false
      - key: ASAAS_API_URL
        sync: false
      - key: ASAAS_WEBHOOK_TOKEN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: PORT
        value: 3000
